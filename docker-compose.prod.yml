name: webmonitor-prod

services:
  nginx:
    build:
      context: ./docker/nginx
    image: webmonitor-nginx:prod
    container_name: webmonitor_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/up >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  app:
    build: .
    image: webmonitor-app:prod
    container_name: webmonitor_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-web_monitor}
      DB_USERNAME: ${DB_USERNAME:-webmonitor}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      QUEUE_CONNECTION: database
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
    volumes:
      - app_storage_app:/var/www/html/storage/app
      - app_storage_logs:/var/www/html/storage/logs
      - app_storage_framework:/var/www/html/storage/framework
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/up >/dev/null || curl -fsS http://localhost/status >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  queue-metrics:
    image: webmonitor-app:prod
    container_name: webmonitor_queue_metrics
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work database --queue=metrics --sleep=1 --tries=3 --timeout=60 --max-time=3600
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-web_monitor}
      DB_USERNAME: ${DB_USERNAME:-webmonitor}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      QUEUE_CONNECTION: database
    volumes:
      - app_storage_app:/var/www/html/storage/app
      - app_storage_logs:/var/www/html/storage/logs
      - app_storage_framework:/var/www/html/storage/framework
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[q]ueue:work database --queue=metrics' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  queue-checks:
    image: webmonitor-app:prod
    container_name: webmonitor_queue_checks
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work database --queue=checks --sleep=2 --tries=3 --timeout=90 --max-time=3600
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-web_monitor}
      DB_USERNAME: ${DB_USERNAME:-webmonitor}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      QUEUE_CONNECTION: database
    volumes:
      - app_storage_app:/var/www/html/storage/app
      - app_storage_logs:/var/www/html/storage/logs
      - app_storage_framework:/var/www/html/storage/framework
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[q]ueue:work database --queue=checks' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  queue-alerts:
    image: webmonitor-app:prod
    container_name: webmonitor_queue_alerts
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work database --queue=alerts --sleep=2 --tries=3 --timeout=60 --max-time=3600
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-web_monitor}
      DB_USERNAME: ${DB_USERNAME:-webmonitor}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      QUEUE_CONNECTION: database
    volumes:
      - app_storage_app:/var/www/html/storage/app
      - app_storage_logs:/var/www/html/storage/logs
      - app_storage_framework:/var/www/html/storage/framework
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[q]ueue:work database --queue=alerts' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  queue-security:
    image: webmonitor-app:prod
    container_name: webmonitor_queue_security
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work database --queue=security --sleep=3 --tries=3 --timeout=180 --max-time=3600
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-web_monitor}
      DB_USERNAME: ${DB_USERNAME:-webmonitor}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      QUEUE_CONNECTION: database
    volumes:
      - app_storage_app:/var/www/html/storage/app
      - app_storage_logs:/var/www/html/storage/logs
      - app_storage_framework:/var/www/html/storage/framework
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[q]ueue:work database --queue=security' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  queue-reports:
    image: webmonitor-app:prod
    container_name: webmonitor_queue_reports
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work database --queue=reports --sleep=3 --tries=2 --timeout=300 --max-time=3600
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-web_monitor}
      DB_USERNAME: ${DB_USERNAME:-webmonitor}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      QUEUE_CONNECTION: database
    volumes:
      - app_storage_app:/var/www/html/storage/app
      - app_storage_logs:/var/www/html/storage/logs
      - app_storage_framework:/var/www/html/storage/framework
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[q]ueue:work database --queue=reports' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  scheduler:
    image: webmonitor-app:prod
    container_name: webmonitor_scheduler
    restart: unless-stopped
    env_file:
      - .env
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-web_monitor}
      DB_USERNAME: ${DB_USERNAME:-webmonitor}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      QUEUE_CONNECTION: database
    volumes:
      - app_storage_app:/var/www/html/storage/app
      - app_storage_logs:/var/www/html/storage/logs
      - app_storage_framework:/var/www/html/storage/framework
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[s]chedule:run' >/dev/null || php artisan schedule:list >/dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  mysql:
    image: mysql:8.4
    container_name: webmonitor_mysql8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-web_monitor}
      MYSQL_USER: ${DB_USERNAME:-webmonitor}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  db_data:
    name: webmonitor_prod_mysql_data
  app_storage_app:
    name: webmonitor_prod_storage_app
  app_storage_logs:
    name: webmonitor_prod_storage_logs
  app_storage_framework:
    name: webmonitor_prod_storage_framework
  app_bootstrap_cache:
    name: webmonitor_prod_bootstrap_cache
