version: '3.8'

services:
  app:
    build: .
    container_name: web_monitor_app
    restart: always
    ports:
      - "8000:80"
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_DATABASE=${DB_DATABASE:-web_monitor}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      - db

  db:
    image: mariadb:latest
    container_name: web_monitor_db
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-web_monitor}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql

  reverb:
    build: .
    container_name: web_monitor_reverb
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    depends_on:
      - app

volumes:
  db_data:
