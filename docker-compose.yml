version: '3.8'

services:
  app:
    build: .
    container_name: web_monitor_app
    restart: always
    env_file:
      - .env
    ports:
      - "8000:80"
    command: sh -c "mkdir -p storage/logs && touch storage/logs/laravel.log && chmod -R 0777 storage bootstrap/cache && chmod 0666 storage/logs/laravel.log && apache2-foreground"
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_DATABASE=${DB_DATABASE:-web_monitor}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - storage_logs:/var/www/html/storage/logs
      - storage_framework:/var/www/html/storage/framework
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - db

  db:
    image: mariadb:latest
    container_name: web_monitor_db
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-web_monitor}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql

  reverb:
    build: .
    container_name: web_monitor_reverb
    restart: always
    env_file:
      - .env
    command: sh -c "mkdir -p storage/logs && touch storage/logs/laravel.log && chmod -R 0777 storage bootstrap/cache && chmod 0666 storage/logs/laravel.log && php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_DATABASE=${DB_DATABASE:-web_monitor}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - storage_logs:/var/www/html/storage/logs
      - storage_framework:/var/www/html/storage/framework
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - app

  worker:
    build: .
    container_name: web_monitor_worker
    restart: always
    env_file:
      - .env
    command: sh -c "mkdir -p storage/logs && touch storage/logs/laravel.log && chmod -R 0777 storage bootstrap/cache && chmod 0666 storage/logs/laravel.log && php artisan queue:work --verbose --tries=3 --timeout=90"
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_DATABASE=${DB_DATABASE:-web_monitor}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - storage_logs:/var/www/html/storage/logs
      - storage_framework:/var/www/html/storage/framework
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - db
      - app

  scheduler:
    build: .
    container_name: web_monitor_scheduler
    restart: always
    env_file:
      - .env
    command: sh -c "mkdir -p storage/logs && touch storage/logs/laravel.log && chmod -R 0777 storage bootstrap/cache && chmod 0666 storage/logs/laravel.log && while [ true ]; do php artisan schedule:run --no-interaction & sleep 60; done"
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_DATABASE=${DB_DATABASE:-web_monitor}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - storage_logs:/var/www/html/storage/logs
      - storage_framework:/var/www/html/storage/framework
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - db
      - app

volumes:
  db_data:
  storage_logs:
  storage_framework:
  bootstrap_cache:
